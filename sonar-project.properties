# Configuration SonarCloud pour le monorepo StackNest.
# Le scanner est declenche depuis .github/workflows/ci-nightly.yml (job 'sonar').
# Doc : https://docs.sonarsource.com/sonarqube-server/latest/analyzing-source-code/analysis-parameters/

# projectKey et organization sont injectes par le workflow CI
# (ci-nightly.yml -> job sonar -> env SONAR_PROJECT_KEY / SONAR_ORGANIZATION
# via --define). Rend le projet portable si l'owner / le nom du repo change.
# En local, si tu veux lancer sonar manuellement : passer en CLI args
# -Dsonar.projectKey=... -Dsonar.organization=... ou surcharger via un
# sonar-project.local.properties non committe.
sonar.host.url=https://sonarcloud.io
sonar.projectName=StackNest

# ─── Sources & tests ────────────────────────────────────────────
# Monorepo : on analyse backend (apps/api) + frontend (apps/web).
# Les infra (Terraform, workflows GitHub Actions) ne sont pas couverts
# par Sonar (d'autres outils s'en chargent : checkov, actionlint).
sonar.sources=apps/api/app,apps/web/src
sonar.tests=apps/api/app,apps/web/src

# Tests co-located dans __tests__/ des deux cotes, reperes par suffixe.
sonar.test.inclusions=**/__tests__/**/*.unit.py,**/__tests__/**/*.integ.py,**/__tests__/**/*.unit.test.ts,**/__tests__/**/*.unit.test.tsx,**/__tests__/**/*.integ.test.ts,**/__tests__/**/*.integ.test.tsx

# ─── Encoding ──────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ─── Coverage (generee par pytest --cov / vitest --coverage) ────
sonar.python.coverage.reportPaths=apps/api/coverage.xml
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=apps/web/coverage/lcov.info

# ─── Exclusions coverage ───────────────────────────────────────
# On exclut les tests eux-memes, les __init__.py vides, l'entrypoint Vite.
sonar.coverage.exclusions=**/__tests__/**,**/*.test.{ts,tsx},**/__init__.py,**/main.tsx,**/vite-env.d.ts,**/main.py

# ─── Duplications ──────────────────────────────────────────────
# Ignore les tests pour le calcul de duplication (structures repetitives normales).
sonar.cpd.exclusions=**/__tests__/**
