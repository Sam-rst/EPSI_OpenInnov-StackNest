target-version = "py313"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line too long (le formatter gere)
    "N818",  # exception suffix "Error": le projet utilise "Exception" (DomainException, ...)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]     # unused imports OK pour re-export
"tests/**/*.py" = ["S101"]   # assert OK dans les tests

[format]
quote-style = "double"
indent-style = "space"
