# Configuration Alembic pour StackNest API.
#
# La connexion (`sqlalchemy.url`) n'est PAS codee ici : env.py la lit depuis
# `Settings.database_url` (env var `DATABASE_URL`) pour rester 12-factor et
# eviter de committer une URL. La cle ci-dessous est laissee vide ; un
# override en ligne de commande (`-x` ou `set_main_option`) reste possible
# pour les tests.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
# Separateur des chemins multi-valeurs (evite le fallback legacy deprecie).
path_separator = os
# Format des fichiers de revision : timestamp + slug pour un tri lisible.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
# Laisse vide : resolue par env.py depuis Settings.database_url.
sqlalchemy.url =

[post_write_hooks]
# Formate les migrations generees avec ruff (coherence avec le quality gate).
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
