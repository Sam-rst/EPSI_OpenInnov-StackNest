# Override dev de StackNest.
# Usage : docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Rajoute :
#   - hot reload API (uvicorn --reload + volume monte sur apps/api/app)
#   - Vite dev server pour l'UI (HMR) servi via l'image node (pas nginx)
#   - expose DB et Redis sur l'hote pour les outils devs (psql, redis-cli)
#
# Nginx (apps/web/Dockerfile) reste utilise pour les envs preview/prod.

services:
  db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    # --root-path /api : informe FastAPI qu'il est servi derriere le prefixe
    # /api (Vite proxy en dev, Nginx en preview/prod). Necessaire pour que
    # Swagger UI genere la bonne URL d'openapi.json a /api/openapi.json.
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --root-path
      - /api
    volumes:
      - ./apps/api/app:/app/app:ro
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV: dev
      # SMTP -> MailHog (capture des mails en dev). Liens vers le front Vite (:8080).
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      AUTH_VERIFY_URL_BASE: http://localhost:8080/verify
      AUTH_RESET_URL_BASE: http://localhost:8080/reset
    depends_on:
      mailhog:
        condition: service_healthy

  # En dev on remplace l'image Nginx par un conteneur Node qui fait tourner
  # Vite dev server (HMR). Le proxy '/api' -> 'http://api:8000' est configure
  # dans vite.config.ts via VITE_API_PROXY_TARGET.
  ui:
    image: node:20-alpine
    build: !reset null
    working_dir: /app
    command: ["sh", "-c", "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      VITE_ENVIRONMENT: ${VITE_ENVIRONMENT:-dev}
      VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
      # Force le watcher Vite en mode polling : le bind-mount Windows/macOS
      # vers le container Linux ne propage pas inotify, donc les changements
      # sur ./apps/web restent invisibles cote container sans polling.
      VITE_USE_POLLING: "true"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports: !override
      - "${UI_PORT:-8080}:5173"

  # Worker : execution locale des conteneurs via le demon Docker de l'hote.
  # Le DockerSdkProvisioner (docker.from_env) a besoin du socket Docker pour
  # parler au demon local. Sans ce montage, le worker plante au demarrage
  # (FileNotFoundError sur /var/run/docker.sock) et aucun deploiement ne se
  # provisionne. En prod, on cible un hote d'execution distant via DOCKER_HOST.
  worker:
    # Local uniquement : le socket Docker hote est root:docker, or l'image
    # tourne en utilisateur non-root -> PermissionError. On force root pour
    # l'execution locale. En prod (DOCKER_HOST=ssh), pas de socket -> non requis.
    user: "root"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # MailHog : capture des mails sortants en dev (inbox web http://localhost:8025).
  mailhog:
    image: mailhog/mailhog:v1.0.1
    networks: [stacknest]
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v2/messages"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
