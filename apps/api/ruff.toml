target-version = "py313"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line too long (le formatter gere)
    "N818",  # exception suffix "Error": le projet utilise "Exception" (DomainException, ...)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]                # unused imports OK pour re-export
"**/__tests__/**/*.py" = ["S101"]       # assert OK dans les tests co-located
"tests/**/*.py" = ["S101"]              # assert OK dans les tests E2E
# Modeles ORM : alias idiomatique `UUID as PgUUID` (distinguer le type colonne
# Postgres du `uuid.UUID` Python). N811 le voit comme "constante renommee".
"**/infrastructure/models/*.py" = ["N811"]

[format]
quote-style = "double"
indent-style = "space"
