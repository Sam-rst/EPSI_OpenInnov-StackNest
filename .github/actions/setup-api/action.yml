name: Setup API
description: Checkout + uv + install apps/api dependencies (frozen). DRY le setup
  repete dans chaque job de la lane api (6 jobs × 3 etapes identiques).

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "apps/api/uv.lock"

    - name: Install dependencies (uv sync --frozen)
      shell: bash
      working-directory: apps/api
      run: uv sync --frozen
