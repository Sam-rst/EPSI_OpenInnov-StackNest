# Configuration de l'Automatic Analysis SonarQube Cloud (SonarCloud).
#
# IMPORTANT : il existe DEUX modes d'analyse Sonar dans ce repo, qui lisent
# des fichiers de config DIFFERENTS :
#   - Analyse CI-based (scanner lance par .github/workflows/ci-nightly.yml,
#     job 'sonar', la nuit) -> lit `sonar-project.properties`.
#   - Automatic Analysis (declenchee automatiquement par SonarCloud sur chaque
#     push / pull request, poste le check "SonarCloud Code Analysis") -> lit
#     CE fichier `.sonarcloud.properties` (et IGNORE `sonar-project.properties`).
# Doc : https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis/
#
# Les deux fichiers doivent donc rester coherents sur les exclusions.

# ─── Exclusions ────────────────────────────────────────────────
# `apps/web-mockup/` est la reference design issue de la branche `mockups`
# (STN-157) : code prototype AS-IS, HORS quality gate par construction, jamais
# redeveloppe sur place (chaque ecran est reimplemente en TDD strict dans
# apps/web). On l'exclut de l'analyse automatique pour qu'aucun smell / hotspot
# du prototype ne fasse echouer le quality gate des PR.
# Les fichiers de test (__tests__/) sont aussi exclus de l'analyse Sonar : leurs
# fixtures utilisent des identifiants / secrets FACTICES (mots de passe et cles
# JWT de test) qui declenchaient S2068/S6418, et l'Automatic Analysis n'honore
# PAS `sonar.issue.ignore.multicriteria` (seul `sonar.exclusions` marche ici).
# Les tests restent valides par pytest + ruff/mypy ; Sonar se concentre sur le
# code de PRODUCTION. Aucun vrai secret n'est dans le repo (env / SOPS).
sonar.exclusions=apps/web-mockup/**,**/__tests__/**,**/tests/**
