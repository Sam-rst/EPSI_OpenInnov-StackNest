# Resolver DNS embarque de Docker (docker-compose) — resoud l'upstream a la
# volee plutot qu'au demarrage, pour que l'image puisse booter meme si le
# service api n'est pas encore la (test local, healthcheck, etc.).
resolver 127.0.0.11 ipv6=off valid=30s;

server {
    # Port non-privilegie : l'image nginx-unprivileged tourne en USER 101, qui
    # ne peut pas binder < 1024 sans capability reseau. Coherent avec EXPOSE /
    # HEALTHCHECK 8080 du Dockerfile. Le mapping vers l'hote est fait par compose.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API vers le service backend du docker-compose.
    # L'URL est stockee dans une variable pour forcer la resolution DNS a la
    # premiere requete (sinon nginx crash au boot si le host n'existe pas).
    location /api/ {
        set $api_upstream http://api:8000;
        # Strip du prefixe /api avant de proxifier : les routers FastAPI sont
        # montes a la racine (/auth, /catalog, /health). Miroir exact du rewrite
        # Vite en dev (path.replace(/^\/api/, '')). Sans ce rewrite, l'API
        # recevrait /api/auth/login et renverrait 404.
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (suivi live deploiement, chat IA a venir) : Nginx bufferise les
        # reponses par defaut, ce qui casse le streaming d'evenements (stepper
        # et logs figes). On desactive le buffering et on allonge le timeout
        # pour les connexions longues type EventSource/fetch-SSE.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback pour react-router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache des assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
