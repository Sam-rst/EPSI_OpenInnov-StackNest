# Docker Compose base StackNest — services communs aux environnements.
# Les overrides (docker-compose.dev.yml, preview, prod) ajustent volumes,
# commandes et ports exposes sans dupliquer la topologie.

name: stacknest

networks:
  stacknest:
    driver: bridge

volumes:
  db_data:
  redis_data:
  ollama_data:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stacknest}
      POSTGRES_USER: ${POSTGRES_USER:-stacknest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stacknest}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: [stacknest]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stacknest} -d ${POSTGRES_DB:-stacknest}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [stacknest]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        DEPLOYED_AT: ${DEPLOYED_AT:-1970-01-01T00:00:00Z}
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://stacknest:stacknest@db:5432/stacknest}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [stacknest]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # TODO: worker reel quand le module app/worker sera scaffole (ticket dedie).
  # Pour l'instant, on partage l'image api avec une commande no-op qui garde
  # le conteneur en vie afin de valider l'orchestration (6 services CA1).
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: ["python", "-c", "import time; print('[worker] placeholder STN-11 — TODO scaffolder app/worker'); time.sleep(2**31)"]
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://stacknest:stacknest@db:5432/stacknest}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    networks: [stacknest]
    restart: unless-stopped

  ui:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      - api
    networks: [stacknest]
    ports:
      - "${UI_PORT:-8080}:80"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama_data:/root/.ollama
    networks: [stacknest]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    restart: unless-stopped
