<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StackNest - Déploiement (POC)</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand" aria-label="Identité StackNest">
      <img id="logo" class="logo" src="./assets/stacknest-logo.png" alt="Logo StackNest" />
      <div class="brand-text">
        <h1>StackNest</h1>
        <p>Build Fast. Deploy Smart.</p>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="card" aria-labelledby="deployTitle">
      <h2 id="deployTitle">Déploiement</h2>

      <form id="deployForm" novalidate>
        <div class="field">
          <label for="template">Template</label>
          <select id="template" name="template" aria-label="Choisir un template">
            <option value="ubuntu">Ubuntu</option>
            <option value="debian">Debian</option>
          </select>
        </div>

        <div class="field">
          <label for="vmCount">Nombre de VM</label>
          <input id="vmCount" name="vmCount" type="number" min="1" step="1" value="1" inputmode="numeric" />
        </div>

        <div class="actions">
          <button id="deployBtn" class="btn btn-primary" type="submit" aria-label="Déployer la configuration">
            <span class="spinner" aria-hidden="true"></span>
            <span class="btn-label">Déployer</span>
          </button>
          <button id="errorBtn" class="btn btn-secondary" type="button" aria-label="Simuler une erreur">Simuler erreur</button>
        </div>
      </form>
    </section>

    <section class="card result-card" aria-labelledby="resultTitle">
      <div class="result-header">
        <h2 id="resultTitle">Résultat</h2>
        <span id="statusBadge" class="status status-idle" role="status" aria-live="polite">En attente</span>
      </div>

      <pre id="resultJson" class="json-output" aria-live="polite">Aucun résultat pour le moment.</pre>

      <button id="copyBtn" class="btn btn-copy" type="button" aria-label="Copier le résultat JSON" disabled>
        Copier le résultat
      </button>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
