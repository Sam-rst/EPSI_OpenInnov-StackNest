services:
  api:
    build:
      context: ./api
    env_file:
      - .env
    environment:
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_TOKEN: ${N8N_TOKEN}
      PORT: ${PORT:-3001}
      DEBUG_ENV: ${DEBUG_ENV:-0}
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10

  ui:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
