# Docker Compose base StackNest — services communs aux environnements.
# Les overrides (docker-compose.dev.yml, preview, prod) ajustent volumes,
# commandes et ports exposes sans dupliquer la topologie.

# Nom de projet variabilisé pour isoler les stacks multi-worktrees (STN-156).
# Chaque worktree exporte COMPOSE_PROJECT_NAME via son .env (généré par
# scripts/worktree.sh). Défaut = stacknest (dépôt principal / slot 0).
name: ${COMPOSE_PROJECT_NAME:-stacknest}

networks:
  stacknest:
    driver: bridge

volumes:
  db_data:
  redis_data:
  ollama_data:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stacknest}
      POSTGRES_USER: ${POSTGRES_USER:-stacknest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stacknest}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: [stacknest]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stacknest} -d ${POSTGRES_DB:-stacknest}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [stacknest]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Service one-shot : applique les migrations Alembic puis seed le catalogue
  # (idempotent) AVANT que l'API/worker demarrent. Sans lui, la base est vide
  # au premier `compose up` et l'app est cassee (aucune table, catalogue vide).
  migrate:
    image: ${API_IMAGE:-stacknest-api:local}
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: ["sh", "-c", "alembic upgrade head && python -m app.cli seed-catalog"]
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://stacknest:stacknest@db:5432/stacknest}
    depends_on:
      db:
        condition: service_healthy
    networks: [stacknest]
    restart: "no"

  api:
    image: ${API_IMAGE:-stacknest-api:local}
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        DEPLOYED_AT: ${DEPLOYED_AT:-1970-01-01T00:00:00Z}
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://stacknest:stacknest@db:5432/stacknest}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Chat IA / LLM (pluggable, cf. design Chat IA). Defaut Ollama local sans
      # cle. La cle reelle vient de l'env / .env local (gitignore, jamais
      # commitee) ; en preview/prod la CD l'injecte via SOPS. Aucun secret ici.
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama3.1}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [stacknest]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # Worker arq : consomme la file Redis `stacknest:deployment` et orchestre le
  # cycle de vie reel des conteneurs (PROVISION/STOP/START/DESTROY/REGENERATE)
  # via le DockerSdkProvisioner. Partage l'image API (meme paquet `app/`) mais
  # ne sert aucune API HTTP. La cible Docker est `DOCKER_HOST` (vide = demon
  # local en dev ; ssh://deployer@B injecte par la CD en preview/prod).
  worker:
    image: ${API_IMAGE:-stacknest-api:local}
    # Ne sert pas d'API HTTP → on desactive le healthcheck herite de l'image
    # (qui sonde :8000). La sante du worker se lit via Redis/arq, pas via HTTP.
    healthcheck:
      disable: true
    command: ["arq", "app.worker_main.WorkerSettings"]
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://stacknest:stacknest@db:5432/stacknest}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DOCKER_HOST: ${DOCKER_HOST:-}
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [stacknest]
    restart: unless-stopped

  ui:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      - api
    networks: [stacknest]
    ports:
      - "${UI_PORT:-8080}:8080"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama_data:/root/.ollama
    networks: [stacknest]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    restart: unless-stopped

  # NB : pas de service SMTP dans le base (iso-prod). Le mail est fourni par
  # l'override d'environnement : `dev` et `preview` ajoutent MailHog (capture) ;
  # `prod` (a venir) cablera un vrai SMTP via SOPS (STN-35). Le base reste donc
  # deployable tel quel en prod sans surface mail superflue.
